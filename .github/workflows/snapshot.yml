name: Snapshot (dev)

# Triggered on every push to main that touches Rust source or the CI itself.
# Produces a rolling pre-release tagged "snapshot" — always points at HEAD.
on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/snapshot.yml'
      - '.github/workflows/release.yml'

  # Allow manual trigger from the Actions UI
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# ─────────────────────────────────────────────────────────────────────────────
# Build matrix — identical to release.yml
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build · ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: nexa-linux-x86_64
            use_cross: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset: nexa-linux-aarch64
            use_cross: true

          - os: macos-13
            target: x86_64-apple-darwin
            asset: nexa-macos-x86_64
            use_cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            asset: nexa-macos-aarch64
            use_cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: nexa-windows-x86_64
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: snapshot-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: snapshot-${{ matrix.target }}-

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build nexa (cross)
        if: matrix.use_cross
        run: cross build --release --locked --bin nexa --target ${{ matrix.target }}

      - name: Build nexa (native)
        if: "!matrix.use_cross"
        run: cargo build --release --locked --bin nexa --target ${{ matrix.target }}

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/nexa"
          ARCHIVE="${{ matrix.asset }}.tar.gz"
          strip "$BIN" 2>/dev/null || true
          tar -czf "$ARCHIVE" -C "$(dirname "$BIN")" "$(basename "$BIN")"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi
          echo "ASSET=$ARCHIVE"           >> "$GITHUB_ENV"
          echo "CHECKSUM=$ARCHIVE.sha256" >> "$GITHUB_ENV"

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin     = "target/${{ matrix.target }}/release/nexa.exe"
          $archive = "${{ matrix.asset }}.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Set-Content "$archive.sha256"
          "ASSET=$archive"           | Out-File -FilePath $env:GITHUB_ENV -Append
          "CHECKSUM=$archive.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ env.ASSET }}
            ${{ env.CHECKSUM }}
          retention-days: 1
          if-no-files-found: error

# ─────────────────────────────────────────────────────────────────────────────
# Rolling snapshot release — delete-and-recreate on every run
# ─────────────────────────────────────────────────────────────────────────────
  snapshot-release:
    name: Publish snapshot release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      # Write release notes to a file — avoids heredoc inside YAML run block.
      - name: Write release notes
        run: |
          SHORT_SHA="${{ github.sha }}"
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          printf "## Development Snapshot\n\n" > notes.md
          printf "Built from \`main\` at **%s** (%.7s).\n\n" "$BUILD_DATE" "$SHORT_SHA" >> notes.md
          printf "This is an **unstable pre-release**. For production use the stable channel.\n\n" >> notes.md
          printf "**Install snapshot:**\n\`\`\`sh\n" >> notes.md
          printf "curl --proto '=https' --tlsv1.2 -sSf \\\\\n" >> notes.md
          printf "  https://raw.githubusercontent.com/na2sime/Nexa-lang/main/setup.sh \\\\\n" >> notes.md
          printf "  | sh -s -- --channel snapshot\n\`\`\`\n" >> notes.md

      # Delete the old snapshot release + tag, then recreate pointing at HEAD.
      - name: Delete existing snapshot release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete snapshot --yes --cleanup-tag 2>/dev/null || true

      - name: Create snapshot release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          gh release create snapshot \
            --title "Snapshot – ${BUILD_DATE} (${SHORT_SHA:0:7})" \
            --notes-file notes.md \
            --prerelease

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload snapshot artifacts/*
