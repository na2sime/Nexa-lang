name: Docker — Nexa CLI

# Rebuild the CLI image on every push to main that touches Rust or the Dockerfile,
# and on every stable release tag.
on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile.cli'
      - 'docker/hub-readme.md'
      - '.github/workflows/docker-cli.yml'
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required for provenance attestation

env:
  IMAGE_NAME: nexalang/nexa

jobs:
  build-and-push:
    name: Build & push Nexa CLI image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # short git SHA for traceability
            type=sha,prefix=sha-,format=short
            # full semver on release tags: v1.2.3 → 1.2.3 and 1.2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=Nexa CLI
            org.opencontainers.image.description=Official CLI for the Nexa language — build, run, and publish Nexa projects
            org.opencontainers.image.vendor=Nexa Language Organization
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.cli
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true    # supply chain attestation (SLSA provenance)
          sbom: true          # software bill of materials
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        # Requires DOCKERHUB_TOKEN with "Read, Write & Delete" permissions.
        # hub.docker.com → Account Settings → Personal Access Tokens
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./docker/hub-readme.md
          short-description: Official CLI for the Nexa language — build, run, and publish Nexa projects
